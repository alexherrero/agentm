title = "agentm gitleaks config"

# Inherit gitleaks's default ruleset for common credential shapes
# (AWS keys, GitHub tokens, generic API keys, JWT, etc.)
[extend]
useDefault = true

# Allowlist patterns known-safe in agentm
[allowlist]
description = "Patterns that are known-safe in agentm (public repo, owned by alexherrero)"

regexes = [
    # The public GitHub handle appears in URLs, README, AGENTS.md
    '''alexherrero''',
    # RFC 2606 reserved domains for documentation examples
    '''@example\.(com|org|net)''',
    # NANP reserved phone-number prefix for documentation
    '''555-01[0-9]{2}''',
    # Common placeholder strings — not credentials
    '''<API_KEY>''',
    '''<TOKEN>''',
]

paths = [
    # The gitleaks config itself
    '''\.gitleaks\.toml''',
    # Deliberately constructs secret-shaped fixtures (fake GitHub PAT, fake
    # OpenAI-style key) to test privacy_scrub.scrub_pii()'s redaction —
    # found live 2026-07-06 running PLAN-per-plan-ci's nightly main-HEAD
    # backstop for the first time: the PR-scoped pii-guardrails job's gitleaks
    # scan never happened to touch this file's line in a recent diff, but the
    # nightly job's full-history scan (gitleaks-action's own workflow_dispatch/
    # schedule behavior) does, and flagged the ghp_ fixture as a real secret.
    '''scripts/test_privacy_scrub\.py''',
]
