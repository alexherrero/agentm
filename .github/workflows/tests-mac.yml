name: "[T] Mac Tests"

# Worktree-native flow (ratified 2026-07-06): gates on pull_request, not push
# to main (main only merges a PR whose required checks already passed).
# pull_request carries no paths-ignore — a required check a trigger-level
# filter could skip would block a docs-only PR's merge forever; the diet
# returns as a job-level no-op under PLAN-per-plan-ci. push runs nothing here
# (no light-weight subset of this job exists); tests-linux.yml's `syntax`
# job is the one light check that still runs on push.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'wiki/**'
      - '**/*.md'
  pull_request: {}
  workflow_dispatch: {}  # L7: exempt from GITHUB_TOKEN's no-recursive-trigger
    # suppression — see tests-linux.yml's comment for why this is needed.
  workflow_call:
    inputs:
      full_battery:
        type: boolean
        default: true

jobs:
  install-smoke:
    name: install-smoke
    runs-on: macos-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || inputs.full_battery
    steps:
      - uses: actions/checkout@v4
      # macos-latest ships jq, python3, and pwsh 7+ preinstalled.
      - name: Install Python deps (for validate script)
        # sqlite-vec lets verify-memory-roundtrip.sh exercise the vec-index
        # nearest-neighbor read-back; the e2e self-skips it if the runner's
        # Python can't load extensions. Enhancement, never a hard dep. fastmcp
        # lets verify-mcp-surface.py + the auto-discovered
        # test_memory_mcp_tools.py actually run instead of gracefully
        # skipping — R1.6, this was previously never installed anywhere.
        run: python3 -m pip install --break-system-packages pyyaml sqlite-vec fastmcp
      - name: Run smoke-install (bash) + post-install integrity
        run: bash scripts/smoke-install-bash.sh
      - name: Validate adapter frontmatter / TOML / JSON (cross-platform)
        run: python3 scripts/validate-adapters.py
      - name: Check cross-references + hook-fragment schema parity
        run: python3 scripts/check-references.py
      - name: bash -n on every .sh
        run: bash scripts/check-syntax.sh
      - name: AST-parse every .ps1
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-syntax.ps1
      - name: Verify lib/install/ checksums
        run: bash scripts/check-vendored-parity.sh lib
      - name: Run check-no-pii.sh
        run: bash scripts/check-no-pii.sh --all
      - name: check-personas (requires ⊆ substrate + no-always-load)
        run: python3 scripts/check-personas.py
      - name: "check-governs-index (governs:/area: overlap + unknown-area)"
        run: python3 scripts/check-governs-index.py
      - name: check-vendored-parity (hook-config mode — 4 hook _resolve_vault_path copies)
        run: bash scripts/check-vendored-parity.sh hook-config
      - name: Unit tests — auto-discover every scripts/test_*.py
        # v4.5.1 task 1: use unittest discover so new test files are picked
        # up without a workflow edit. Closes pre-v4.5.1 CI gap where
        # test_install_migrate.py was invisible.
        run: (cd scripts && python3 -m unittest discover -p 'test_*.py')
      - name: V4 push-surface integration check (verify-v4.sh)
        # End-to-end check of the auto-orchestration surface against a throwaway
        # scratch vault (bash-native; Windows skips, like the other .sh gates).
        run: bash scripts/verify-v4.sh
      - name: check-vendored-parity (vault-lock mode)
        # The two copies of the vault-write protocol — scripts/vault_lock.py and
        # its vendored twin harness/skills/memory/scripts/vault_lock.py — must
        # stay sha256-identical (testInfra#0: was check-all.sh-only, invisible to CI).
        run: bash scripts/check-vendored-parity.sh vault-lock
      - name: verify-orchestration-briefing (PM-half integration check)
        # PM-owned orchestration signals (briefing · HIGH watchlist · incubator ·
        # idea-ledger · staged-adapt · both nudges) against a throwaway scratch
        # vault (testInfra#1: was check-all.sh-only, invisible to CI).
        run: bash scripts/verify-orchestration-briefing.sh
      - name: verify-hook-resolution (dual-key vault_path read, 4 hooks)
        # Regression guard for the hook config dual-key read (R1.2 / agentmEngine#0):
        # a scratch HOME with .agentm-config.json carrying ONLY the plugin-namespaced
        # vault key must still resolve for all four memory hooks.
        run: bash scripts/verify-hook-resolution.sh
      - name: verify-state-routing (backend x project-mode matrix, never-demote)
        # R1.3 / agentmEngine#1: the backend x project-mode routing matrix +
        # the never-demote guard (explicit storage.backend=vault + a broken
        # vault path must fail loud, never silently write repo-local).
        run: bash scripts/verify-state-routing.sh
      - name: verify-vec-index (drain pipeline e2e, freshness invariant)
        # R1.4 / agentmExperience#0: save→queue→drain(stub)→index round-trip,
        # entry_meta row assertions (SKIPPED if sqlite-vec unavailable, never
        # dropped), and the freshness invariant. CI runs WITHOUT the fault
        # (VERIFY_VEC_INDEX_FAULT=1 is a manual/local regression check, same
        # convention as VERIFY_MEMORY_FAULT in verify-memory-roundtrip.sh).
        run: bash scripts/verify-vec-index.sh
      - name: verify-reflection (tri-lane routing, machine-source filter)
        # R1.5 / agentmExperience#2 (R0.3 fix): a genuine operator preference
        # classifies HIGH and auto-saves; a subagents/-path transcript never
        # contributes to the vault even carrying the same still-HIGH pattern,
        # across all three --route-mode values.
        run: bash scripts/verify-reflection.sh
      - name: verify-dreaming (stage->confirm->revert-log e2e, no-silent-apply-on-timeout)
        # PLAN-wave-e-dreaming task 4: a manual /dream run against a seeded
        # corpus stages a dedup proposal without mutating any source file;
        # confirm() applies it through revert_log and the same RevertLog can
        # undo it (proves apply routes through the journal, not a direct
        # write); an expired proposal's confirm() raises and never applies
        # (no silent apply on timeout); the shipped job manifest
        # (templates/jobs/dream.yaml) parses and stays dry_run: true.
        run: bash scripts/verify-dreaming.sh
      - name: verify-mcp-surface (append/search/forget round-trip, dead-surface fate)
        # R1.6 / agentmEngine#2: an in-process FastMCP client drives the real
        # append->search->forget round-trip, soft-delete semantics, and the
        # three dead-recall-surface fates (memory_recall + recall_here
        # retired; documenter_context's V5-3 stub contract locked).
        run: python3 scripts/verify-mcp-surface.py
      - name: health-score-determinism (scorecard byte-identical across two runs)
        # R1.8 Task 1: the health scorecard aggregator must be deterministic —
        # two runs against the same fixture input produce byte-identical markdown.
        run: python3 scripts/health/health_score.py --check-determinism --path scripts/health/fixtures/sample-records.jsonl
      - name: validate-audit-coverage (5 in-scope mythos-readiness blockers detectable)
        # R1.8 Task 3: proves the regression net catches what the audit caught
        # by hand, for the 5 of 11 verified blockers with code presence in
        # this repo (the other 6 are crickets-repo code or doc/content
        # staleness — out of an agentm verify script's reach; see the
        # script's own header for the full breakdown).
        run: bash scripts/health/validate-audit-coverage.sh
      - name: run-ablation-baseline (mechanical uplift, on/off per subsystem)
        # PLAN-r3-uplift-scoring task 2 (R3.1b): runs each of the four R3.1a
        # subsystems' verify script on/off, scores both through health_score.py,
        # emits an ablation record. Deterministic, no live model calls — the
        # evidence-tracker record gracefully skips here (no crickets sibling
        # checkout in this repo's CI); its own gate lives in crickets check-all.sh.
        run: bash scripts/health/run-ablation-baseline.sh
      - name: Phase-lifecycle e2e, both state modes (verify-phases.sh)
        run: bash scripts/verify-phases.sh
      - name: Memory-engine round-trip e2e (verify-memory-roundtrip.sh)
        run: bash scripts/verify-memory-roundtrip.sh
