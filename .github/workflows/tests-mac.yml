name: "[T] Mac Tests"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  install-smoke:
    name: install-smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # macos-latest ships jq, python3, and pwsh 7+ preinstalled.
      - name: Install Python deps (for validate script)
        # sqlite-vec lets verify-memory-roundtrip.sh exercise the vec-index
        # nearest-neighbor read-back; the e2e self-skips it if the runner's
        # Python can't load extensions. Enhancement, never a hard dep.
        run: python3 -m pip install --break-system-packages pyyaml sqlite-vec
      - name: Run smoke-install (bash) + post-install integrity
        run: bash scripts/smoke-install-bash.sh
      - name: Validate adapter frontmatter / TOML / JSON (cross-platform)
        run: python3 scripts/validate-adapters.py
      - name: Check cross-references + hook-fragment schema parity
        run: python3 scripts/check-references.py
      - name: bash -n on every .sh
        run: bash scripts/check-syntax.sh
      - name: AST-parse every .ps1
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-syntax.ps1
      - name: Verify lib/install/ checksums
        run: bash scripts/check-lib-parity.sh
      - name: Run check-no-pii.sh
        run: bash scripts/check-no-pii.sh --all
      - name: check-personas (requires ⊆ substrate + no-always-load)
        run: python3 scripts/check-personas.py
      - name: "check-governs-index (governs:/area: overlap + unknown-area)"
        run: python3 scripts/check-governs-index.py
      - name: check-hook-config-parity (4 hook _resolve_vault_path copies)
        run: bash scripts/check-hook-config-parity.sh
      - name: Unit tests — auto-discover every scripts/test_*.py
        # v4.5.1 task 1: use unittest discover so new test files are picked
        # up without a workflow edit. Closes pre-v4.5.1 CI gap where
        # test_install_migrate.py was invisible.
        run: (cd scripts && python3 -m unittest discover -p 'test_*.py')
      - name: V4 push-surface integration check (verify-v4.sh)
        # End-to-end check of the auto-orchestration surface against a throwaway
        # scratch vault (bash-native; Windows skips, like the other .sh gates).
        run: bash scripts/verify-v4.sh
      - name: check-vault-lock-parity (vendored vault_lock)
        # The two copies of the vault-write protocol — scripts/vault_lock.py and
        # its vendored twin harness/skills/memory/scripts/vault_lock.py — must
        # stay sha256-identical (testInfra#0: was check-all.sh-only, invisible to CI).
        run: bash scripts/check-vault-lock-parity.sh
      - name: verify-orchestration-briefing (PM-half integration check)
        # PM-owned orchestration signals (briefing · HIGH watchlist · incubator ·
        # idea-ledger · staged-adapt · both nudges) against a throwaway scratch
        # vault (testInfra#1: was check-all.sh-only, invisible to CI).
        run: bash scripts/verify-orchestration-briefing.sh
      - name: verify-hook-resolution (dual-key vault_path read, 4 hooks)
        # Regression guard for the hook config dual-key read (R1.2 / agentmEngine#0):
        # a scratch HOME with .agentm-config.json carrying ONLY the plugin-namespaced
        # vault key must still resolve for all four memory hooks.
        run: bash scripts/verify-hook-resolution.sh
      - name: verify-state-routing (backend x project-mode matrix, never-demote)
        # R1.3 / agentmEngine#1: the backend x project-mode routing matrix +
        # the never-demote guard (explicit storage.backend=vault + a broken
        # vault path must fail loud, never silently write repo-local).
        run: bash scripts/verify-state-routing.sh
      - name: verify-vec-index (drain pipeline e2e, freshness invariant)
        # R1.4 / agentmExperience#0: save→queue→drain(stub)→index round-trip,
        # entry_meta row assertions (SKIPPED if sqlite-vec unavailable, never
        # dropped), and the freshness invariant. CI runs WITHOUT the fault
        # (VERIFY_VEC_INDEX_FAULT=1 is a manual/local regression check, same
        # convention as VERIFY_MEMORY_FAULT in verify-memory-roundtrip.sh).
        run: bash scripts/verify-vec-index.sh
      - name: verify-reflection (tri-lane routing, machine-source filter)
        # R1.5 / agentmExperience#2 (R0.3 fix): a genuine operator preference
        # classifies HIGH and auto-saves; a subagents/-path transcript never
        # contributes to the vault even carrying the same still-HIGH pattern,
        # across all three --route-mode values.
        run: bash scripts/verify-reflection.sh
      - name: Phase-lifecycle e2e, both state modes (verify-phases.sh)
        run: bash scripts/verify-phases.sh
      - name: Memory-engine round-trip e2e (verify-memory-roundtrip.sh)
        run: bash scripts/verify-memory-roundtrip.sh
