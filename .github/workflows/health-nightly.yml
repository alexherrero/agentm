name: "[H] Health Nightly"

# R1.8 Task 4 — the first `on: schedule` workflow in either repo. ADVISORY
# ONLY: this workflow never blocks a merge. The fast tier in
# tests-linux.yml/tests-mac.yml is the merge gate; this is the
# health-monitoring tier layered on top, running the heavier checks that are
# too slow or too dependency-heavy for every push (real-embedding recall,
# a live MCP daemon round-trip over real HTTP, fault-injection negatives,
# a cold-install dogfood pass — see scripts/health/run-heavy-tier.sh).
#
# R1.8 Task 5 added a macOS conformance leg (health-nightly-macos) — same
# heavy tier, macos-latest runner, reports its JSONL as a build artifact.
# Task 5 also folds scripts/health/dark-checks.jsonl (the static registry of
# designed-not-built capabilities) into the scorecard render, so those checks
# render in their own "Dark checks" section.
#
# V8 proving Lane S (2026-07-13, ledger ruling 3): this workflow no longer
# commits or pushes anything — the entire branch/PR/workflow_dispatch/
# --admin merge machinery that used to land the scorecard refresh on
# protected `main` is retired (operator ruling: "why are we checking
# anything in for this?"). CI's job now is purely the clean-runner
# regression signal: run both tiers, render the scorecard, upload it (HTML +
# raw JSONL) as a build artifact. The scorecard an operator actually reads
# day to day is produced locally instead, by the `health-pass` runner job
# (templates/jobs/health-pass.yaml) appending to the vault-resolved history
# ledger and rendering `~/.cache/agentm/telemetry/scorecard.html` — see
# wiki/explanation/Health-Scorecard.md.

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC daily
  workflow_dispatch: {}   # manual trigger for testing / on-demand runs

jobs:
  # macOS runs the heavy tier as a conformance leg only (R1.8 Task 5) — it
  # reports JSONL as an artifact, same as ubuntu-latest's own scorecard
  # artifact below; neither leg writes anything but a build artifact.
  health-nightly-macos:
    name: health-nightly (macos conformance)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies (fast-tier + heavy-tier)
        run: pip3 install pyyaml sqlite-vec fastmcp sentence-transformers
      - name: Run the heavy tier
        run: bash scripts/health/run-heavy-tier.sh > /tmp/heavy-tier-macos.jsonl
      - name: Upload the macOS heavy-tier JSONL for inspection
        uses: actions/upload-artifact@v4
        with:
          name: health-heavy-tier-macos
          path: /tmp/heavy-tier-macos.jsonl
          retention-days: 14

  health-nightly:
    name: health-nightly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies (fast-tier + heavy-tier)
        # sentence-transformers (1.3GB+) is deliberately NOT installed in the
        # fast-tier CI workflows — this is the one place it's worth the cost,
        # since it's the only tier that exercises real (non-stub) embeddings.
        run: pip install pyyaml sqlite-vec fastmcp sentence-transformers
      - name: Run the fast tier
        run: bash scripts/health/run-fast-tier.sh > /tmp/fast-tier.jsonl
      - name: Run the heavy tier
        run: bash scripts/health/run-heavy-tier.sh > /tmp/heavy-tier.jsonl
      - name: Fold in the nightly CI-matrix signal (PLAN-per-plan-ci task 3)
        # nightly-main.yml (the full 3-OS matrix rerun against main HEAD,
        # independent of any PR — the backstop the pull_request-only CI
        # trigger move needed) reports its own conclusion via a separate
        # scheduled workflow, not this job. Reads its most recent completed
        # run and folds it in as one record so both nightly signals land in
        # the same scorecard, per the plan's own task 3.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          conclusion=$(gh run list --repo "${{ github.repository }}" \
            --workflow nightly-main.yml --status completed --limit 1 \
            --json conclusion --jq '.[0].conclusion // "unknown"')
          if [ "$conclusion" = "success" ]; then pass=true; else pass=false; fi
          echo "{\"suite\": \"nightly-ci-matrix\", \"axis\": \"verification honesty\", \"check\": \"nightly main-HEAD full-matrix backstop (tests-linux/mac/windows rerun independent of any PR)\", \"pass\": $pass, \"weight\": 1.0}" \
            > /tmp/nightly-ci-matrix.jsonl
      - name: Render the scorecard artifacts (HTML + the combined raw JSONL) — no commit, no push
        run: |
          cat /tmp/fast-tier.jsonl /tmp/heavy-tier.jsonl /tmp/nightly-ci-matrix.jsonl scripts/health/dark-checks.jsonl \
            > /tmp/health-records.jsonl
          cat /tmp/health-records.jsonl | python3 scripts/health/health_score.py --html-output /tmp/scorecard.html
      - name: Upload the scorecard + raw records as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: health-scorecard-ubuntu
          path: |
            /tmp/scorecard.html
            /tmp/health-records.jsonl
          retention-days: 14
