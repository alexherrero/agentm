name: "[T] Linux Tests"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  install-smoke:
    name: install-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run smoke-install (bash) + post-install integrity
        run: bash scripts/smoke-install-bash.sh
      - name: Installer-boundary byte-for-byte test (wiki scaffold)
        run: bash scripts/test-install.sh

  adapter-parity:
    name: adapter-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-parity.sh

  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: pip install pyyaml
      - name: Validate adapter frontmatter / TOML / JSON
        run: python3 scripts/validate-adapters.py
      - name: Check cross-references + hook-fragment schema parity
        run: python3 scripts/check-references.py
      - name: Lint wiki (Diátaxis / ADR 0004; warn-only, flips to --strict in task 6)
        run: python3 scripts/check-wiki.py
        continue-on-error: true

  syntax:
    name: syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on every .sh
        run: bash scripts/check-syntax.sh
      - name: AST-parse every .ps1 (pwsh ships on ubuntu-latest)
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-syntax.ps1

  dogfood-workflows:
    # Source-repo invariant: every workflow the harness ships as a template
    # must be active at the repo root, byte-identical to the template.
    # Complements install-smoke (which validates the target-project
    # propagation path — template -> scratch install). This job validates
    # the self-consumption path — template -> this repo's own
    # .github/workflows/.
    name: dogfood-workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Every templated workflow is active at repo root, byte-identical
        run: |
          set -euo pipefail
          shopt -s nullglob
          missing=0
          for tmpl in templates/.github/workflows/*.yml; do
            name="$(basename "$tmpl")"
            active=".github/workflows/$name"
            if [[ ! -f "$active" ]]; then
              echo "::error::$active is missing — $tmpl ships as a template but is not active at the repo root"
              missing=1
              continue
            fi
            if ! diff -u "$tmpl" "$active"; then
              echo "::error::$active drifted from $tmpl"
              missing=1
            fi
          done
          exit "$missing"
