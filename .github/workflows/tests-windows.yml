name: "[T] Windows Tests"

on:
  push:
    branches: [main]
  pull_request:

jobs:
  install-smoke:
    name: install-smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # windows-latest ships pwsh 7+ and Python preinstalled.
      - name: Install Python deps (for validate script)
        run: python -m pip install pyyaml
      - name: Run smoke-install (pwsh) + post-install integrity
        shell: pwsh
        run: pwsh -NoProfile -File scripts/smoke-install-pwsh.ps1
      - name: Run test-install (pwsh) — installer-boundary guard
        shell: pwsh
        run: pwsh -NoProfile -File scripts/test-install.ps1
      - name: Validate adapter frontmatter / TOML / JSON (cross-platform)
        run: python scripts/validate-adapters.py
      - name: Check cross-references + hook-fragment schema parity
        run: python scripts/check-references.py
      - name: AST-parse every .ps1
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-syntax.ps1
      # bash -n skipped on Windows (git-bash is present but path-mangling
      # makes find(1) unreliable; Linux + Mac cover .sh parse).
      - name: Verify lib/install/ checksums
        shell: bash
        run: bash scripts/check-lib-parity.sh
      - name: Run check-no-pii.sh
        shell: bash
        run: bash scripts/check-no-pii.sh --all
      - name: check-personas (requires ⊆ substrate + no-always-load)
        run: python scripts/check-personas.py
      - name: check-hook-config-parity (4 hook _resolve_vault_path copies)
        shell: bash
        run: bash scripts/check-hook-config-parity.sh
      - name: Unit tests — auto-discover every scripts/test_*.py
        # v4.5.1 task 1: use unittest discover so new test files are picked
        # up without a workflow edit. Closes pre-v4.5.1 CI gap where
        # test_install_migrate.py was invisible.
        # PowerShell on windows-latest: cd is invocation-scoped via parens.
        shell: pwsh
        run: |
          Push-Location scripts
          python -m unittest discover -p 'test_*.py'
          Pop-Location
