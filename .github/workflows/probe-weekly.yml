name: "[H] Probe Weekly"

# PLAN-r3-uplift-scoring task 4 (R3.2b) — the D-⑫ seeded task-pair battery's
# live runner. ADVISORY ONLY, same convention as health-nightly.yml: this
# workflow never blocks a merge. It runs the four task pairs
# (scripts/health/probes/checkers.py) live — real model, real bare-vs-backed
# sessions via the `claude` CLI — scores them with Task 3's deterministic
# checkers, and appends one trend-line row to
# scripts/health/probe-history.jsonl.
#
# Two trigger paths:
#   - `schedule`: the routine weekly cadence.
#   - `workflow_dispatch` with `trigger: model-upgrade`: fires the same
#     battery outside the weekly cadence when the default model configured
#     for a session bumps — the harness's own re-audit-on-model-upgrade
#     principle (harness/principles.md), applied here as an actual trigger
#     rather than a manual habit. `scripts/health/probes/check_model_bump.py`
#     is the scripted config-diff a human (or a future automation) runs to
#     decide whether to dispatch this workflow with that input.

on:
  schedule:
    - cron: '0 7 * * 1'  # 07:00 UTC every Monday
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Why this run fired'
        required: false
        default: 'manual'
        type: choice
        options:
          - manual
          - model-upgrade
      model:
        description: 'Model alias/name to pass to the claude CLI (blank = CLI default)'
        required: false
        default: ''

permissions:
  contents: write  # the auto-commit step needs to push probe-history.jsonl

jobs:
  probe-weekly:
    name: probe-weekly
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run the D-12 probe battery live (advisory — never blocks a merge)
        env:
          TRIGGER_REASON: ${{ github.event.inputs.trigger || 'scheduled' }}
          MODEL_INPUT: ${{ github.event.inputs.model || '' }}
        run: |
          ARGS=(--trigger "$TRIGGER_REASON")
          if [ -n "$MODEL_INPUT" ]; then
            ARGS+=(--model "$MODEL_INPUT")
          fi
          python3 scripts/health/probes/run_live.py "${ARGS[@]}"
      - name: Commit the updated probe history (advisory — never blocks a merge)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/health/probe-history.jsonl
          git diff --cached --quiet && echo "no probe-history changes to commit" && exit 0
          git commit -m "chore(health): weekly D-12 probe trend-line refresh [skip ci]"
          git push
