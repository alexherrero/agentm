name: "[T] CI All"

# Aggregator workflow that waits for the 3 per-OS test workflows on the same
# commit, then reports a combined success/failure. The README + wiki Home
# badge points at this workflow only, so it's not affected by other apps'
# check suites (e.g. a stuck-queued check from an installed GitHub App).
#
# Why this exists: shields.io's `github/checks-status` endpoint rolls up ALL
# check suites on a ref, including ones from apps we don't control. Badging
# this single workflow gives us a clean aggregate that we DO control.

# Worktree-native flow (ratified 2026-07-06): the aggregate only matters for
# gating a PR merge, so it's pull_request-only now — no push trigger, no
# paths-ignore (a required check a trigger-level filter could skip would
# block a docs-only PR's merge forever; the diet returns as a job-level
# no-op under PLAN-per-plan-ci).
on:
  pull_request: {}
  workflow_dispatch: {}  # L7: dispatchable against a bot-pushed branch, whose
    # pull_request-triggered run (and the 3 OS workflows it polls for) never
    # fires — GitHub gates pull_request runs triggered by GITHUB_TOKEN behind
    # action_required with zero jobs. workflow_dispatch is exempt from that
    # suppression; health-nightly.yml dispatches this + the 3 OS workflows
    # directly against its rolling branch instead of relying on --auto to
    # wait for a check that will never post.

jobs:
  aggregate:
    name: aggregate
    runs-on: ubuntu-latest
    timeout-minutes: 25  # safety net; usually completes in ~3-8 min
    permissions:
      actions: read

    steps:
      - name: Wait for and verify the 3 OS workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          # On pull_request, github.sha is the ephemeral merge commit, but the
          # per-OS workflow runs are recorded under the PR *head* SHA — so
          # `gh run list --commit github.sha` matches nothing and times out.
          # Use the PR head SHA on pull_request; fall back to github.sha on push.
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          # L7 follow-up: a bot-pushed branch carries BOTH a stale
          # pull_request-triggered run (action_required, GITHUB_TOKEN pushes
          # can't clear that gate) and health-nightly.yml's own
          # workflow_dispatch run for the same SHA — `--commit` alone can
          # match either one non-deterministically. Filter by this run's own
          # trigger kind so we always poll our sibling, not the stale one
          # (caught live: the first proof-run's poll picked up a stale
          # action_required tests-mac run instead of the real dispatch).
          EVENT: ${{ github.event_name }}
        run: |
          set -e
          WORKFLOWS="tests-linux tests-mac tests-windows"

          # Poll until all 3 reach 'completed' status, or timeout via job-level setting.
          for attempt in $(seq 1 45); do
            all_done=true
            for wf in $WORKFLOWS; do
              status=$(gh run list \
                --repo "$REPO" \
                --workflow "${wf}.yml" \
                --commit "$SHA" \
                --event "$EVENT" \
                --limit 1 \
                --json status \
                --jq '.[0].status // "missing"')
              if [ "$status" != "completed" ]; then
                all_done=false
                echo "  $wf: $status"
              else
                echo "  $wf: completed"
              fi
            done
            if $all_done; then
              break
            fi
            echo "  ... waiting 30s (attempt $attempt / 45)"
            sleep 30
          done

          if ! $all_done; then
            echo ""
            echo "FAIL: not all 3 OS workflows completed within timeout."
            exit 1
          fi

          echo ""
          echo "All 3 OS workflows completed — checking conclusions:"
          fail=0
          for wf in $WORKFLOWS; do
            conclusion=$(gh run list \
              --repo "$REPO" \
              --workflow "${wf}.yml" \
              --commit "$SHA" \
              --event "$EVENT" \
              --limit 1 \
              --json conclusion \
              --jq '.[0].conclusion')
            echo "  $wf: $conclusion"
            [ "$conclusion" = "success" ] || fail=1
          done

          if [ $fail -ne 0 ]; then
            echo ""
            echo "FAIL: at least one OS workflow did not pass."
            exit 1
          fi

          echo ""
          echo "PASS: all 3 OS workflows succeeded on $SHA"
