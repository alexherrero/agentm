<svg viewBox="0 0 760 540" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arT" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2F6FBA"/></marker>
    <marker id="arD" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#7A8089"/></marker>
  </defs>
  <rect x="6" y="6" width="748" height="528" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>

  <!-- inbound adapters -->
  <rect x="40" y="24" width="680" height="86" rx="11" fill="#FAFBFD" stroke="#C9D2DE" stroke-width="1.3"/>
  <text x="56" y="44" font-size="11" font-weight="700" fill="#5E7A99">INBOUND ADAPTERS — the ways in</text>
  <rect x="70" y="52" width="290" height="46" rx="8" fill="#ffffff" stroke="#2F6FBA" stroke-width="1.4"/>
  <text x="215" y="72" font-size="12.5" font-weight="600" fill="#1B3A5B" text-anchor="middle">In-process</text>
  <text x="215" y="89" font-size="10" font-style="italic" fill="#5E7A99" text-anchor="middle">always · a library call · no daemon</text>
  <rect x="400" y="52" width="290" height="46" rx="8" fill="#ffffff" stroke="#9AA0A6" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="545" y="72" font-size="12.5" font-weight="600" fill="#3C4043" text-anchor="middle">MCP server</text>
  <text x="545" y="89" font-size="10" font-style="italic" fill="#6B7280" text-anchor="middle">opt-in · external clients</text>

  <!-- engine -->
  <rect x="190" y="170" width="380" height="64" rx="10" fill="#EAF1FB" stroke="#2F6FBA" stroke-width="1.7"/>
  <text x="380" y="195" font-size="14" font-weight="700" fill="#1B3A5B" text-anchor="middle">Memory engine — the verbs</text>
  <text x="380" y="213" font-size="10.5" font-style="italic" fill="#5E7A99" text-anchor="middle">save · recall · forget · CAS · soft-delete · budgeted recall</text>

  <!-- seam -->
  <rect x="150" y="294" width="460" height="86" rx="11" fill="#DCE8F8" stroke="#2F6FBA" stroke-width="1.8"/>
  <text x="166" y="314" font-size="11" font-weight="700" fill="#1B3A5B">STORAGE SEAM — the one port</text>
  <rect x="180" y="322" width="190" height="46" rx="8" fill="#ffffff" stroke="#2F6FBA" stroke-width="1.3"/>
  <text x="275" y="342" font-size="12" font-weight="600" fill="#1B3A5B" text-anchor="middle">selector</text>
  <text x="275" y="359" font-size="10" font-style="italic" fill="#5E7A99" text-anchor="middle">protocol → backend</text>
  <rect x="390" y="322" width="200" height="46" rx="8" fill="#ffffff" stroke="#2F6FBA" stroke-width="1.3"/>
  <text x="490" y="342" font-size="12" font-weight="600" fill="#1B3A5B" text-anchor="middle">StorageBackend</text>
  <text x="490" y="359" font-size="10" font-style="italic" fill="#5E7A99" text-anchor="middle">the contract</text>

  <!-- backends -->
  <rect x="150" y="440" width="220" height="56" rx="9" fill="#ffffff" stroke="#2F6FBA" stroke-width="1.3"/>
  <text x="260" y="464" font-size="12.5" font-weight="600" fill="#1B3A5B" text-anchor="middle">device-local</text>
  <text x="260" y="481" font-size="10" font-style="italic" fill="#5E7A99" text-anchor="middle">agentm</text>
  <rect x="410" y="440" width="220" height="56" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.3"/>
  <text x="520" y="464" font-size="12.5" font-weight="600" fill="#1E5435" text-anchor="middle">obsidian-vault</text>
  <text x="520" y="481" font-size="10" font-style="italic" fill="#4E7A60" text-anchor="middle">crickets backing plugin</text>

  <!-- flows -->
  <line x1="215" y1="98" x2="330" y2="170" stroke="#2F6FBA" stroke-width="2.4" marker-end="url(#arT)"/>
  <line x1="545" y1="98" x2="430" y2="170" stroke="#7A8089" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#arD)"/>
  <line x1="380" y1="234" x2="380" y2="294" stroke="#2F6FBA" stroke-width="2.4" marker-end="url(#arT)"/>
  <line x1="275" y1="380" x2="260" y2="440" stroke="#2F6FBA" stroke-width="2.2" marker-end="url(#arT)"/>
  <line x1="490" y1="380" x2="520" y2="440" stroke="#2F6FBA" stroke-width="2.2" marker-end="url(#arT)"/>

  <!-- caption -->
  <text x="380" y="520" font-size="11" font-style="italic" fill="#6B7280" text-anchor="middle">Thick = the always-present path; dotted = opt-in. Local storage needs no daemon — the seam is a library. (Target layout; today the MCP server and memory entries still reach around the seam.)</text>
</svg>
