<svg viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="6" y="6" width="868" height="458" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>

  <!-- bedrock -->
  <rect x="300" y="26" width="280" height="52" rx="12" fill="#FBEFD6" stroke="#C8961E" stroke-width="1.6"/>
  <text x="440" y="50" font-size="14.5" font-weight="700" fill="#6B4E12" text-anchor="middle">The nine principles</text>
  <text x="440" y="68" font-size="11.5" font-style="italic" fill="#9A7A2E" text-anchor="middle">shared bedrock — both halves stand on all nine</text>

  <!-- bedrock to bins -->
  <path d="M440,78 C 260,100 190,108 160,150" fill="none" stroke="#B6BAC2" stroke-width="1.5"/>
  <line x1="440" y1="78" x2="440" y2="150" stroke="#B6BAC2" stroke-width="1.5"/>
  <path d="M440,78 C 620,100 690,108 720,150" fill="none" stroke="#B6BAC2" stroke-width="1.5"/>

  <!-- bins -->
  <rect x="40" y="150" width="240" height="50" rx="10" fill="#EAF1FB" stroke="#2F6FBA" stroke-width="1.6"/>
  <text x="160" y="173" font-size="13.5" font-weight="700" fill="#1B3A5B" text-anchor="middle">agentm carries</text>
  <text x="160" y="190" font-size="10.5" font-style="italic" fill="#5E7A99" text-anchor="middle">the stateful substrate</text>

  <rect x="320" y="150" width="240" height="50" rx="10" fill="#F4EFE6" stroke="#B08A3A" stroke-width="1.6"/>
  <text x="440" y="173" font-size="13.5" font-weight="700" fill="#6B4E12" text-anchor="middle">jointly held</text>
  <text x="440" y="190" font-size="10.5" font-style="italic" fill="#9A7A4E" text-anchor="middle">structural ethos</text>

  <rect x="600" y="150" width="240" height="50" rx="10" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.6"/>
  <text x="720" y="173" font-size="13.5" font-weight="700" fill="#1E5435" text-anchor="middle">crickets carries</text>
  <text x="720" y="190" font-size="10.5" font-style="italic" fill="#4E7A60" text-anchor="middle">the stateless tools</text>

  <!-- bin to chip connectors -->
  <g stroke="#B9CDE6" stroke-width="1.4">
    <line x1="160" y1="200" x2="160" y2="212"/><line x1="160" y1="252" x2="160" y2="258"/><line x1="160" y1="298" x2="160" y2="304"/><line x1="160" y1="344" x2="160" y2="350"/>
  </g>
  <g stroke="#DDCFB0" stroke-width="1.4">
    <line x1="440" y1="200" x2="440" y2="212"/><line x1="440" y1="252" x2="440" y2="258"/><line x1="440" y1="298" x2="440" y2="304"/>
  </g>
  <g stroke="#A8DcBd" stroke-width="1.4">
    <line x1="720" y1="200" x2="720" y2="212"/><line x1="720" y1="252" x2="720" y2="258"/>
  </g>

  <!-- agentm chips -->
  <g font-size="12" font-weight="600" fill="#1B3A5B" text-anchor="middle">
    <rect x="40" y="212" width="240" height="40" rx="7" fill="#ffffff" stroke="#B9CDE6" stroke-width="1.3"/><text x="160" y="237">P1 · memory on disk</text>
    <rect x="40" y="258" width="240" height="40" rx="7" fill="#ffffff" stroke="#B9CDE6" stroke-width="1.3"/><text x="160" y="283">P2 · grouped &amp; owned</text>
    <rect x="40" y="304" width="240" height="40" rx="7" fill="#ffffff" stroke="#B9CDE6" stroke-width="1.3"/><text x="160" y="329">P3 · checks before opinions</text>
    <rect x="40" y="350" width="240" height="40" rx="7" fill="#ffffff" stroke="#B9CDE6" stroke-width="1.3"/><text x="160" y="375">P9 · match model to work</text>
  </g>

  <!-- jointly chips -->
  <g font-size="12" font-weight="600" fill="#6B4E12" text-anchor="middle">
    <rect x="320" y="212" width="240" height="40" rx="7" fill="#ffffff" stroke="#DDCFB0" stroke-width="1.3"/><text x="440" y="237">P6 · independent pieces</text>
    <rect x="320" y="258" width="240" height="40" rx="7" fill="#ffffff" stroke="#DDCFB0" stroke-width="1.3"/><text x="440" y="283">P7 · simplest thing</text>
    <rect x="320" y="304" width="240" height="40" rx="7" fill="#ffffff" stroke="#DDCFB0" stroke-width="1.3"/><text x="440" y="329">P8 · re-check the scaffold</text>
  </g>

  <!-- crickets chips -->
  <g font-size="12" font-weight="600" fill="#1E5435" text-anchor="middle">
    <rect x="600" y="212" width="240" height="40" rx="7" fill="#ffffff" stroke="#A8DCBD" stroke-width="1.3"/><text x="720" y="237">P4 · assume there are bugs</text>
    <rect x="600" y="258" width="240" height="40" rx="7" fill="#ffffff" stroke="#A8DCBD" stroke-width="1.3"/><text x="720" y="283">P5 · human owns the irreversible</text>
  </g>

  <!-- caption -->
  <text x="440" y="420" font-size="11.5" font-style="italic" fill="#6B7280" text-anchor="middle">Each principle has a natural home — where it is most load-bearingly realized.</text>
  <text x="440" y="436" font-size="11.5" font-style="italic" fill="#6B7280" text-anchor="middle">A jointly-held belief is reached from the tool up to the substrate's mechanism.</text>
</svg>
