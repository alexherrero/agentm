<svg viewBox="0 0 900 365" width="1200" height="487" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="pa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7E57C2"/></marker>
    <marker id="ps" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5B7C9E"/></marker>
  </defs>
  <rect x="6" y="6" width="888" height="353" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>
  <text x="450" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#4A2E80">How a persona is put on</text>

  <!-- pipeline -->
  <g>
    <rect x="20" y="56" width="128" height="50" rx="9" fill="#EDE9F7" stroke="#7E57C2" stroke-width="1.4"/>
    <text x="84" y="78" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E80">select</text>
    <text x="84" y="93" text-anchor="middle" font-size="7.5" fill="#6E5B96">explicit · workflow-step</text>

    <rect x="165" y="56" width="128" height="50" rx="9" fill="#EDE9F7" stroke="#7E57C2" stroke-width="1.4"/>
    <text x="229" y="78" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E80">gate</text>
    <text x="229" y="93" text-anchor="middle" font-size="7.5" fill="#6E5B96">check-personas</text>

    <rect x="310" y="56" width="128" height="50" rx="9" fill="#EDE9F7" stroke="#7E57C2" stroke-width="1.4"/>
    <text x="374" y="78" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E80">load</text>
    <text x="374" y="93" text-anchor="middle" font-size="7.5" fill="#6E5B96">manifest, on demand</text>

    <rect x="455" y="54" width="128" height="54" rx="10" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2"/>
    <text x="519" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#4A2E80">resolve</text>
    <text x="519" y="92" text-anchor="middle" font-size="7.5" fill="#6E5B96">the three bindings</text>

    <rect x="600" y="56" width="128" height="50" rx="9" fill="#EDE9F7" stroke="#7E57C2" stroke-width="1.4"/>
    <text x="664" y="75" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E80">compose</text>
    <text x="664" y="89" text-anchor="middle" font-size="7.5" fill="#6E5B96">stance + tools</text>
    <text x="664" y="99" text-anchor="middle" font-size="7.5" fill="#6E5B96">+ Memory beneath</text>

    <rect x="745" y="56" width="128" height="50" rx="9" fill="#EDE9F7" stroke="#7E57C2" stroke-width="1.4"/>
    <text x="809" y="78" text-anchor="middle" font-size="10.5" font-weight="700" fill="#4A2E80">run</text>
    <text x="809" y="93" text-anchor="middle" font-size="7.5" fill="#6E5B96">in its mode</text>
  </g>

  <path d="M148,81 L163,81" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#pa)"/>
  <path d="M293,81 L308,81" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#pa)"/>
  <path d="M438,81 L453,81" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#pa)"/>
  <path d="M583,81 L598,81" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#pa)"/>
  <path d="M728,81 L743,81" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#pa)"/>

  <!-- resolvers (one-way, called by resolve) -->
  <path d="M495,108 L235,176" fill="none" stroke="#5B7C9E" stroke-width="1.2" marker-end="url(#ps)"/>
  <path d="M519,108 L455,176" fill="none" stroke="#5B7C9E" stroke-width="1.2" marker-end="url(#ps)"/>
  <path d="M543,108 L665,176" fill="none" stroke="#5B7C9E" stroke-width="1.2" marker-end="url(#ps)"/>
  <text x="566" y="138" text-anchor="start" font-size="8" font-style="italic" fill="#8A8A92">one-way</text>

  <rect x="120" y="178" width="190" height="48" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="215" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#2F4B6B">tier</text>
  <text x="215" y="214" text-anchor="middle" font-size="8" fill="#5E7891">→ model-effort routing</text>
  <rect x="350" y="178" width="190" height="48" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="445" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#2F4B6B">opinions</text>
  <text x="445" y="214" text-anchor="middle" font-size="8" fill="#5E7891">→ opinion_resolve</text>
  <rect x="580" y="178" width="190" height="48" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="675" y="199" text-anchor="middle" font-size="10" font-weight="700" fill="#2F4B6B">capabilities</text>
  <text x="675" y="214" text-anchor="middle" font-size="8" fill="#5E7891">→ capability_resolver</text>

  <!-- host seam -->
  <rect x="120" y="256" width="650" height="44" rx="9" fill="#F4F4F6" stroke="#B0B0B8" stroke-width="1.3"/>
  <text x="445" y="276" text-anchor="middle" font-size="10" font-weight="700" fill="#8A8A92">the sub-agent path compiles down to the host dispatch</text>
  <text x="445" y="291" text-anchor="middle" font-size="8.5" fill="#A0A0A8">Claude Code agent-def (Task · description · model) · Antigravity SKILL.md (start_subagent)</text>
  <path d="M809,106 L809,278 L772,278" fill="none" stroke="#B0B0B8" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ps)"/>

  <text x="450" y="332" text-anchor="middle" font-size="8.5" font-style="italic" fill="#8A78AE">Auto-detection from the task is research-open; v1 selects by explicit invocation or a workflow step. Each binding resolves one-way through its own resolver.</text>
</svg>
