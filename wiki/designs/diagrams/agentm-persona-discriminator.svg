<svg viewBox="0 0 720 470" width="1040" height="679" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="da" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7E57C2"/></marker>
    <marker id="dg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9AA0AA"/></marker>
  </defs>
  <rect x="6" y="6" width="708" height="458" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>
  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#4A2E80">Persona or tool? — the discriminator</text>

  <!-- start -->
  <rect x="270" y="48" width="180" height="40" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="360" y="72" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2F4B6B">a new standing concern</text>
  <path d="M360,88 V118" fill="none" stroke="#7E57C2" stroke-width="1.4" marker-end="url(#da)"/>

  <!-- decision 1 -->
  <rect x="238" y="120" width="244" height="58" rx="10" fill="#F2EEFB" stroke="#7E57C2" stroke-width="1.6"/>
  <text x="360" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#4A2E80">cross-capability judgment?</text>
  <text x="360" y="160" text-anchor="middle" font-size="8" fill="#6E5B96">spans &gt;1 capability · leans on an opinion</text>

  <!-- D1 no -> tool -->
  <path d="M482,149 H536" fill="none" stroke="#9AA0AA" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#dg)"/>
  <text x="509" y="143" text-anchor="middle" font-size="8" font-style="italic" fill="#8A8A92">no</text>
  <rect x="540" y="126" width="160" height="46" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="620" y="146" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2F4B6B">tool / skill / capability</text>
  <text x="620" y="161" text-anchor="middle" font-size="8" fill="#5E7891">→ crickets</text>

  <!-- D1 yes -> D2 -->
  <path d="M360,178 V220" fill="none" stroke="#7E57C2" stroke-width="1.4" marker-end="url(#da)"/>
  <text x="372" y="202" text-anchor="start" font-size="8" font-style="italic" fill="#6E5B96">yes</text>

  <!-- decision 2 -->
  <rect x="238" y="222" width="244" height="58" rx="10" fill="#F2EEFB" stroke="#7E57C2" stroke-width="1.6"/>
  <text x="360" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#4A2E80">hard-requires only substrate?</text>
  <text x="360" y="262" text-anchor="middle" font-size="8" fill="#6E5B96">requires: ⊆ agentm scripts/ (gate-enforced)</text>

  <!-- D2 no -> capability -->
  <path d="M482,251 H536" fill="none" stroke="#9AA0AA" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#dg)"/>
  <text x="509" y="245" text-anchor="middle" font-size="8" font-style="italic" fill="#8A8A92">no</text>
  <rect x="540" y="228" width="160" height="46" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="620" y="248" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2F4B6B">depends up</text>
  <text x="620" y="263" text-anchor="middle" font-size="8" fill="#5E7891">→ crickets capability</text>

  <!-- D2 yes -> persona -->
  <path d="M360,280 V324" fill="none" stroke="#7E57C2" stroke-width="1.4" marker-end="url(#da)"/>
  <text x="372" y="306" text-anchor="start" font-size="8" font-style="italic" fill="#6E5B96">yes</text>

  <!-- result: persona -->
  <rect x="255" y="326" width="210" height="52" rx="10" fill="#EDE9F7" stroke="#7E57C2" stroke-width="2"/>
  <text x="360" y="348" text-anchor="middle" font-size="12" font-weight="700" fill="#4A2E80">persona</text>
  <text x="360" y="365" text-anchor="middle" font-size="8.5" fill="#6E5B96">agentm personas/ · kind: persona</text>

  <!-- not the test -->
  <rect x="30" y="326" width="195" height="52" rx="9" fill="#F4F4F6" stroke="#B0B0B8" stroke-width="1.3"/>
  <text x="127" y="346" text-anchor="middle" font-size="9.5" font-weight="700" fill="#8A8A92">Not the test</text>
  <text x="127" y="362" text-anchor="middle" font-size="8" fill="#A0A0A8">"remembers" · "crosses &gt;1 plugin"</text>

  <text x="360" y="412" text-anchor="middle" font-size="8.5" font-style="italic" fill="#8A78AE">Cross-capability judgment is the live (human) test; the substrate-only floor is the gate-enforced backstop.</text>
  <text x="360" y="430" text-anchor="middle" font-size="8.5" font-style="italic" fill="#8A78AE">github-projects composes developer-workflows yet is a tool — composition alone is not the test.</text>
</svg>
