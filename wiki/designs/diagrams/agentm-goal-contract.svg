<svg viewBox="0 0 860 470" width="1080" height="590" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7E57C2"/></marker>
    <marker id="gg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9AA0AA"/></marker>
  </defs>
  <rect x="6" y="6" width="848" height="458" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>
  <text x="430" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#4A2E80">A /goal run — the loop and its four exits</text>

  <!-- operator input -->
  <rect x="24" y="206" width="178" height="96" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="113" y="228" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2F4B6B">operator input</text>
  <text x="113" y="248" text-anchor="middle" font-size="8.5" fill="#5E7891">objective (falsifiable)</text>
  <text x="113" y="266" text-anchor="middle" font-size="8.5" fill="#5E7891">bound: iterations</text>
  <text x="113" y="280" text-anchor="middle" font-size="8.5" fill="#5E7891">· deadline</text>

  <path d="M202,254 H248" fill="none" stroke="#7E57C2" stroke-width="1.4" marker-end="url(#ga)"/>

  <!-- the loop -->
  <rect x="250" y="92" width="300" height="320" rx="12" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2"/>
  <text x="400" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#4A2E80">each turn of the host run, wrapped</text>
  <text x="400" y="131" text-anchor="middle" font-size="8" font-style="italic" fill="#6E5B96">host: Claude /goal · Antigravity Agent Manager</text>
  <text x="276" y="160" text-anchor="start" font-size="9.5" fill="#4A2E80">1 · limit check  <tspan font-size="7.5" fill="#8A78AE">(iters / deadline)</tspan></text>
  <text x="276" y="184" text-anchor="start" font-size="9.5" fill="#4A2E80">2 · safety pre-check</text>
  <text x="276" y="208" text-anchor="start" font-size="9.5" fill="#4A2E80">3 · plan / re-plan  <tspan font-size="7.5" fill="#8A78AE">(host loop)</tspan></text>
  <text x="276" y="232" text-anchor="start" font-size="9.5" fill="#4A2E80">4 · act  <tspan font-size="7.5" fill="#8A78AE">(host loop)</tspan></text>
  <text x="276" y="256" text-anchor="start" font-size="9.5" fill="#4A2E80">5 · verify  <tspan font-size="7.5" fill="#8A78AE">(gates first)</tspan></text>
  <text x="276" y="280" text-anchor="start" font-size="9.5" fill="#4A2E80">6 · persist to disk</text>
  <text x="276" y="304" text-anchor="start" font-size="9.5" fill="#4A2E80">7 · decide → loop or exit</text>

  <!-- loop-back -->
  <path d="M268,310 C232,300 232,168 264,156" fill="none" stroke="#9AA0AA" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#gg)"/>
  <text x="226" y="238" text-anchor="middle" font-size="8" font-style="italic" fill="#8A8A92">loop</text>

  <!-- exits -->
  <rect x="600" y="104" width="236" height="50" rx="9" fill="#EDE9F7" stroke="#7E57C2" stroke-width="1.8"/>
  <text x="718" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#4A2E80">DONE</text>
  <text x="718" y="141" text-anchor="middle" font-size="8" fill="#6E5B96">criterion passes · confirmed by cold /review</text>

  <rect x="600" y="176" width="236" height="46" rx="9" fill="#F4F4F6" stroke="#B0B0B8" stroke-width="1.3"/>
  <text x="718" y="196" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6E6E76">LIMIT-REACHED</text>
  <text x="718" y="211" text-anchor="middle" font-size="8" fill="#9AA0AA">max-iterations · deadline</text>

  <rect x="600" y="246" width="236" height="46" rx="9" fill="#F4F4F6" stroke="#B0B0B8" stroke-width="1.3"/>
  <text x="718" y="266" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6E6E76">STUCK</text>
  <text x="718" y="281" text-anchor="middle" font-size="8" fill="#9AA0AA">watchdog no-progress · 5-iter cap</text>

  <rect x="600" y="316" width="236" height="46" rx="9" fill="#F4F4F6" stroke="#B0B0B8" stroke-width="1.3"/>
  <text x="718" y="336" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6E6E76">NEEDS-OPERATOR-DECISION</text>
  <text x="718" y="351" text-anchor="middle" font-size="8" fill="#9AA0AA">safety pre-check fails</text>

  <!-- loop to exits -->
  <path d="M550,150 H598" fill="none" stroke="#7E57C2" stroke-width="1.4" marker-end="url(#ga)"/>
  <path d="M550,210 C575,210 575,199 598,199" fill="none" stroke="#9AA0AA" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#gg)"/>
  <path d="M550,260 C575,260 575,269 598,269" fill="none" stroke="#9AA0AA" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#gg)"/>
  <path d="M550,300 C575,300 575,339 598,339" fill="none" stroke="#9AA0AA" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#gg)"/>

  <text x="430" y="446" text-anchor="middle" font-size="8.5" font-style="italic" fill="#8A78AE">Anti-gaming: the done-check is uneditable, and a DONE is confirmed by a cold /review.</text>
</svg>
