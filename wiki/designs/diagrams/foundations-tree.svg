<svg viewBox="0 0 980 600" width="1176" height="720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="dash" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#6B7280"/></marker>
  </defs>
  <rect x="6" y="6" width="968" height="588" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>

  <!-- root -->
  <rect x="390" y="28" width="180" height="56" rx="10" fill="#FBEFD6" stroke="#C8961E" stroke-width="1.6"/>
  <text x="480" y="52" font-size="14" font-weight="700" fill="#6B4E12" text-anchor="middle">P1 · Context is ephemeral</text>
  <text x="480" y="71" font-size="11" font-style="italic" fill="#9A7A2E" text-anchor="middle">state lives on disk</text>

  <!-- root to families -->
  <path d="M480,84 C 300,110 230,118 195,150" fill="none" stroke="#B6BAC2" stroke-width="1.5"/>
  <line x1="480" y1="84" x2="480" y2="150" stroke="#B6BAC2" stroke-width="1.5"/>
  <path d="M480,84 C 660,110 750,118 785,150" fill="none" stroke="#B6BAC2" stroke-width="1.5"/>

  <!-- families -->
  <rect x="70" y="150" width="210" height="48" rx="10" fill="#EEF0FF" stroke="#6366F1" stroke-width="1.6"/>
  <text x="175" y="180" font-size="14" font-weight="700" fill="#353A8C" text-anchor="middle">Shaping the work</text>
  <rect x="375" y="150" width="210" height="48" rx="10" fill="#E7F7EF" stroke="#10B981" stroke-width="1.6"/>
  <text x="480" y="180" font-size="14" font-weight="700" fill="#0B6B4F" text-anchor="middle">Trusting the work</text>
  <rect x="680" y="150" width="210" height="48" rx="10" fill="#FDF3E2" stroke="#E0A82E" stroke-width="1.6"/>
  <text x="785" y="180" font-size="14" font-weight="700" fill="#7A571A" text-anchor="middle">Control &amp; currency</text>

  <!-- family to leaf connectors -->
  <g stroke="#C3C7F2" stroke-width="1.5">
    <line x1="175" y1="198" x2="175" y2="232"/><line x1="175" y1="290" x2="175" y2="302"/><line x1="175" y1="360" x2="175" y2="372"/>
  </g>
  <g stroke="#A8E6CC" stroke-width="1.5">
    <line x1="480" y1="198" x2="480" y2="232"/><line x1="480" y1="290" x2="480" y2="302"/>
  </g>
  <g stroke="#EBD3A0" stroke-width="1.5">
    <line x1="785" y1="198" x2="785" y2="232"/><line x1="785" y1="290" x2="785" y2="302"/><line x1="785" y1="360" x2="785" y2="372"/>
  </g>

  <!-- Shaping leaves -->
  <g>
    <rect x="70" y="232" width="210" height="58" rx="8" fill="#ffffff" stroke="#C3C7F2" stroke-width="1.4"/>
    <text x="175" y="258" font-size="13" font-weight="600" fill="#353A8C" text-anchor="middle">P2 · Single ownership</text>
    <text x="175" y="277" font-size="11" font-style="italic" fill="#8589A6" text-anchor="middle">one owner per piece</text>
  </g>
  <g>
    <rect x="70" y="302" width="210" height="58" rx="8" fill="#ffffff" stroke="#C3C7F2" stroke-width="1.4"/>
    <text x="175" y="328" font-size="13" font-weight="600" fill="#353A8C" text-anchor="middle">P6 · Snap-together pieces</text>
    <text x="175" y="347" font-size="11" font-style="italic" fill="#8589A6" text-anchor="middle">compose to build</text>
  </g>
  <g>
    <rect x="70" y="372" width="210" height="58" rx="8" fill="#ffffff" stroke="#C3C7F2" stroke-width="1.4"/>
    <text x="175" y="398" font-size="13" font-weight="600" fill="#353A8C" text-anchor="middle">P7 · Simplest that works</text>
    <text x="175" y="417" font-size="11" font-style="italic" fill="#8589A6" text-anchor="middle">least machinery</text>
  </g>

  <!-- Trusting leaves -->
  <g>
    <rect x="375" y="232" width="210" height="58" rx="8" fill="#ffffff" stroke="#A8E6CC" stroke-width="1.4"/>
    <text x="480" y="258" font-size="13" font-weight="600" fill="#0B6B4F" text-anchor="middle">P3 · Checks beat claims</text>
    <text x="480" y="277" font-size="11" font-style="italic" fill="#5E9C81" text-anchor="middle">run it to know</text>
  </g>
  <g>
    <rect x="375" y="302" width="210" height="58" rx="8" fill="#ffffff" stroke="#A8E6CC" stroke-width="1.4"/>
    <text x="480" y="328" font-size="13" font-weight="600" fill="#0B6B4F" text-anchor="middle">P4 · Review comes in cold</text>
    <text x="480" y="347" font-size="11" font-style="italic" fill="#5E9C81" text-anchor="middle">a fresh adversary</text>
  </g>

  <!-- Control leaves -->
  <g>
    <rect x="680" y="232" width="210" height="58" rx="8" fill="#ffffff" stroke="#EBD3A0" stroke-width="1.4"/>
    <text x="785" y="258" font-size="13" font-weight="600" fill="#7A571A" text-anchor="middle">P5 · Human owns the undo</text>
    <text x="785" y="277" font-size="11" font-style="italic" fill="#A98B4E" text-anchor="middle">the irreversible call</text>
  </g>
  <g>
    <rect x="680" y="302" width="210" height="58" rx="8" fill="#ffffff" stroke="#EBD3A0" stroke-width="1.4"/>
    <text x="785" y="328" font-size="13" font-weight="600" fill="#7A571A" text-anchor="middle">P8 · Re-audit the scaffold</text>
    <text x="785" y="347" font-size="11" font-style="italic" fill="#A98B4E" text-anchor="middle">re-check each model</text>
  </g>
  <g>
    <rect x="680" y="372" width="210" height="58" rx="8" fill="#ffffff" stroke="#EBD3A0" stroke-width="1.4"/>
    <text x="785" y="398" font-size="13" font-weight="600" fill="#7A571A" text-anchor="middle">P9 · Match model to work</text>
    <text x="785" y="417" font-size="11" font-style="italic" fill="#A98B4E" text-anchor="middle">right tool, right cost</text>
  </g>

  <!-- dashed semantic edges -->
  <path d="M585,261 C 640,278 640,314 585,331" fill="none" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#dash)"/>
  <text x="648" y="292" font-size="10" fill="#0B6B4F">checks first,</text>
  <text x="648" y="306" font-size="10" fill="#0B6B4F">then judged</text>

  <path d="M890,331 C 936,348 936,384 890,401" fill="none" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#dash)"/>
  <text x="900" y="362" font-size="9.5" fill="#7A571A">new model</text>
  <text x="900" y="376" font-size="9.5" fill="#7A571A">⇒ re-route</text>

  <!-- caption -->
  <text x="490" y="470" font-size="11.5" font-style="italic" fill="#6B7280" text-anchor="middle">One root belief branches into three groups. Dashed links are sequencing: checks run before the cold review; a model change drives both re-audit and re-routing.</text>
</svg>
