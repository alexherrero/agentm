<svg viewBox="0 0 760 415" width="1080" height="590" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="oa" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7E57C2"/></marker>
    <marker id="og" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#B0B0B8"/></marker>
  </defs>
  <rect x="6" y="6" width="748" height="403" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>
  <text x="380" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#4A2E80">How an opinion resolves</text>

  <!-- consumers -->
  <rect x="120" y="52" width="230" height="46" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="235" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#2F4B6B">persona</text>
  <text x="235" y="89" text-anchor="middle" font-size="8.5" fill="#5E7891">opinions: manifest axis</text>
  <rect x="410" y="52" width="230" height="46" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="525" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#2F4B6B">capability / skill</text>
  <text x="525" y="89" text-anchor="middle" font-size="8.5" fill="#5E7891">requires: / enhances:</text>

  <path d="M235,98 L330,176" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#oa)"/>
  <path d="M525,98 L430,176" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#oa)"/>
  <text x="380" y="140" text-anchor="middle" font-size="9.5" font-style="italic" fill="#6E5B96">opinion_resolve(name)</text>

  <!-- storage layers -->
  <rect x="18" y="183" width="186" height="52" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="111" y="205" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2F4B6B">coded base</text>
  <text x="111" y="221" text-anchor="middle" font-size="8" fill="#5E7891">opinions/&lt;name&gt;.md · in repo</text>
  <rect x="556" y="183" width="186" height="52" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.3"/>
  <text x="649" y="205" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2F4B6B">learned supplement</text>
  <text x="649" y="221" text-anchor="middle" font-size="8" fill="#5E7891">memory backend · opinions/ area</text>

  <path d="M204,209 L228,209" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#oa)"/>
  <path d="M556,209 L532,209" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#oa)"/>

  <!-- resolver -->
  <rect x="230" y="180" width="300" height="58" rx="12" fill="#F2EEFB" stroke="#7E57C2" stroke-width="2"/>
  <text x="380" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#4A2E80">opinion resolver</text>
  <text x="380" y="223" text-anchor="middle" font-size="8.5" fill="#6E5B96">scans opinions/*.md as data · never imports · never raises</text>

  <path d="M380,238 L380,298" fill="none" stroke="#7E57C2" stroke-width="1.3" marker-end="url(#oa)"/>

  <!-- served output -->
  <rect x="240" y="300" width="280" height="56" rx="12" fill="#EDE9F7" stroke="#7E57C2" stroke-width="1.4"/>
  <text x="380" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#4A2E80">served composite</text>
  <text x="380" y="340" text-anchor="middle" font-size="8.5" fill="#6E5B96">base ⊕ supplement (+ composes:)</text>
  <text x="380" y="374" text-anchor="middle" font-size="8.5" font-style="italic" fill="#8A78AE">reason: served · base-only · no-opinion</text>

  <!-- one-way note -->
  <rect x="18" y="300" width="186" height="44" rx="9" fill="#F4F4F6" stroke="#B0B0B8" stroke-width="1.3"/>
  <text x="111" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="#8A8A92">one-way bridge</text>
  <text x="111" y="335" text-anchor="middle" font-size="8.5" fill="#A0A0A8">crickets → agentm</text>

  <text x="380" y="398" text-anchor="middle" font-size="8.5" font-style="italic" fill="#8A78AE">A consumer asks by name; the resolver folds the in-repo base with the learned supplement and serves one composite.</text>
</svg>
