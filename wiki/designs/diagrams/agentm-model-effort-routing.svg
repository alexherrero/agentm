<svg viewBox="0 0 780 450" width="1092" height="630" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#5B7C9E"/></marker>
    <marker id="ard" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#B0B0B8"/></marker>
  </defs>
  <rect x="6" y="6" width="768" height="438" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>
  <text x="390" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#33424F">Model + effort routing — a tier, rendered to a real model per host &amp; surface</text>

  <!-- inputs -->
  <rect x="44" y="50" width="200" height="44" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.4"/>
  <text x="144" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#33424F">P9 · match model to work</text>
  <text x="144" y="86" text-anchor="middle" font-size="8.5" font-style="italic" fill="#5B7C9E">foundation principle</text>

  <rect x="290" y="50" width="200" height="44" rx="9" fill="#FBF3E2" stroke="#C8961E" stroke-width="1.4"/>
  <text x="390" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#6B4E12">efficient opinion</text>
  <text x="390" y="86" text-anchor="middle" font-size="8.5" font-style="italic" fill="#9A7A2E">the policy lever</text>

  <rect x="536" y="50" width="200" height="44" rx="9" fill="#F2EEFB" stroke="#7E57C2" stroke-width="1.4"/>
  <text x="636" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#4A2E80">personas</text>
  <text x="636" y="86" text-anchor="middle" font-size="8.5" font-style="italic" fill="#6E5B96">each declares a tier</text>

  <!-- inputs → the scale -->
  <path d="M170,94 L300,136" fill="none" stroke="#5B7C9E" stroke-width="1.3" marker-end="url(#ar)"/>
  <path d="M390,94 L390,136" fill="none" stroke="#5B7C9E" stroke-width="1.3" marker-end="url(#ar)"/>
  <path d="M610,94 L480,136" fill="none" stroke="#5B7C9E" stroke-width="1.3" marker-end="url(#ar)"/>

  <!-- the tier scale (canonical artifact) -->
  <rect x="255" y="138" width="270" height="58" rx="10" fill="#EAF1FB" stroke="#2F6FBA" stroke-width="2"/>
  <text x="390" y="160" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1B3A5B">The tier scale</text>
  <text x="390" y="177" text-anchor="middle" font-size="9.5" fill="#3A5A7B">T0 mechanical … T4 deep</text>
  <text x="390" y="190" text-anchor="middle" font-size="8.5" font-style="italic" fill="#5E7A99">(model × effort)</text>

  <!-- token-audit feedback (left) -->
  <rect x="30" y="145" width="150" height="44" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.3"/>
  <text x="105" y="165" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E5435">token-audit</text>
  <text x="105" y="180" text-anchor="middle" font-size="8.5" font-style="italic" fill="#4E7A60">cost trend</text>
  <path d="M180,167 L253,167" fill="none" stroke="#B0B0B8" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ard)"/>
  <text x="216" y="160" text-anchor="middle" font-size="8" font-style="italic" fill="#8A8A92">tunes (dreaming)</text>

  <!-- content-refresh feedback (right, designed/dim) -->
  <rect x="600" y="145" width="150" height="44" rx="9" fill="#F4F4F6" stroke="#B0B0B8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="675" y="165" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8A8A92">content-refresh</text>
  <text x="675" y="180" text-anchor="middle" font-size="8" font-style="italic" fill="#B0B0B8">(designed)</text>
  <path d="M600,167 L527,167" fill="none" stroke="#B0B0B8" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#ard)"/>
  <text x="563" y="160" text-anchor="middle" font-size="8" font-style="italic" fill="#8A8A92">re-pins strings</text>

  <!-- scale → enforcement -->
  <path d="M390,196 L390,232" fill="none" stroke="#5B7C9E" stroke-width="1.4" marker-end="url(#ar)"/>

  <!-- enforcement -->
  <rect x="290" y="232" width="200" height="48" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.6"/>
  <text x="390" y="253" text-anchor="middle" font-size="11.5" font-weight="700" fill="#33424F">Enforcement</text>
  <text x="390" y="269" text-anchor="middle" font-size="9" font-style="italic" fill="#5B7C9E">per host + surface</text>

  <!-- enforcement → outputs -->
  <path d="M340,280 L168,332" fill="none" stroke="#5B7C9E" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="232" y="312" text-anchor="middle" font-size="8.5" font-style="italic" fill="#5B7C9E">spawned agent</text>
  <path d="M390,280 L390,332" fill="none" stroke="#5B7C9E" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="424" y="312" text-anchor="middle" font-size="8.5" font-style="italic" fill="#5B7C9E">in-session</text>
  <path d="M440,280 L612,332" fill="none" stroke="#5B7C9E" stroke-width="1.3" marker-end="url(#ar)"/>
  <text x="556" y="312" text-anchor="middle" font-size="8.5" font-style="italic" fill="#5B7C9E">build default</text>

  <!-- outputs -->
  <rect x="40" y="334" width="210" height="66" rx="9" fill="#ffffff" stroke="#3A9D5D" stroke-width="1.3"/>
  <text x="145" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1E5435">Spawned agent-def</text>
  <text x="145" y="372" text-anchor="middle" font-size="9" fill="#33424F">model: / effort: frontmatter</text>
  <text x="145" y="387" text-anchor="middle" font-size="8.5" font-style="italic" fill="#6FA083">host-applied · automatic</text>

  <rect x="285" y="334" width="210" height="66" rx="9" fill="#ffffff" stroke="#C8961E" stroke-width="1.3"/>
  <text x="390" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6B4E12">In-session phase</text>
  <text x="390" y="372" text-anchor="middle" font-size="9" fill="#33424F">tier nudge — advisory</text>
  <text x="390" y="387" text-anchor="middle" font-size="8.5" font-style="italic" fill="#9A7A2E">/model override</text>

  <rect x="530" y="334" width="210" height="66" rx="9" fill="#ffffff" stroke="#2F6FBA" stroke-width="1.3"/>
  <text x="635" y="356" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1B3A5B">Build default</text>
  <text x="635" y="372" text-anchor="middle" font-size="9" fill="#33424F">opusplan</text>
  <text x="635" y="387" text-anchor="middle" font-size="8.5" font-style="italic" fill="#5E7A99">global alias</text>
</svg>
