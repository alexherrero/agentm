<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="6" y="6" width="808" height="458" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>

  <!-- Layer 0 -->
  <rect x="110" y="26" width="600" height="54" rx="9" fill="#F3F4F6" stroke="#9AA0A6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="410" y="48" font-size="13" font-weight="700" fill="#3C4043" text-anchor="middle">Layer 0 · harness memory</text>
  <text x="410" y="66" font-size="10.5" font-style="italic" fill="#6B7280" text-anchor="middle">the running context window — ephemeral scratch, never the record</text>

  <!-- durability line -->
  <line x1="40" y1="100" x2="780" y2="100" stroke="#B6BAC2" stroke-width="1.3" stroke-dasharray="3 4"/>
  <rect x="300" y="92" width="220" height="16" rx="3" fill="#ffffff"/>
  <text x="410" y="104" font-size="10" font-style="italic" fill="#9AA0A6" text-anchor="middle">durability line — scratch above, the record below</text>

  <!-- Layer 1 band -->
  <rect x="40" y="120" width="740" height="150" rx="12" fill="#F7FAFF" stroke="#2F6FBA" stroke-width="1.5"/>
  <text x="60" y="142" font-size="11.5" font-weight="700" fill="#1B3A5B">Layer 1 · the durable substrate — below the Agent folder</text>
  <rect x="66" y="156" width="328" height="98" rx="9" fill="#EAF1FB" stroke="#2F6FBA" stroke-width="1.4"/>
  <text x="230" y="182" font-size="13" font-weight="700" fill="#1B3A5B" text-anchor="middle">agentm-sole</text>
  <text x="230" y="202" font-size="10.5" font-style="italic" fill="#5E7A99" text-anchor="middle">memories · learnings · reflection · experience</text>
  <text x="230" y="222" font-size="10.5" fill="#3C5E80" text-anchor="middle">agentm writes, curates, prunes freely</text>
  <rect x="426" y="156" width="328" height="98" rx="9" fill="#EAF1FB" stroke="#2F6FBA" stroke-width="1.4"/>
  <text x="590" y="182" font-size="13" font-weight="700" fill="#1B3A5B" text-anchor="middle">co-owned with the user</text>
  <text x="590" y="202" font-size="10.5" font-style="italic" fill="#5E7A99" text-anchor="middle">plans · designs · research</text>
  <text x="590" y="222" font-size="10.5" fill="#3C5E80" text-anchor="middle">agentm proposes, the human ratifies</text>

  <!-- Agent-folder boundary -->
  <line x1="40" y1="292" x2="780" y2="292" stroke="#C8961E" stroke-width="1.6" stroke-dasharray="6 4"/>
  <rect x="262" y="284" width="296" height="16" rx="3" fill="#ffffff"/>
  <text x="410" y="296" font-size="10" font-style="italic" fill="#9A7A2E" text-anchor="middle">Agent-folder boundary — agent space below, the user's vault above</text>

  <!-- user vault -->
  <rect x="110" y="312" width="600" height="64" rx="9" fill="#FBF3E2" stroke="#C8961E" stroke-width="1.5"/>
  <text x="410" y="336" font-size="13" font-weight="700" fill="#6B4E12" text-anchor="middle">the user's curated vault — above the Agent folder</text>
  <text x="410" y="356" font-size="10.5" font-style="italic" fill="#9A7A2E" text-anchor="middle">the user's own notes — agentm reads &amp; links, writes only when told</text>

  <!-- caption -->
  <text x="410" y="408" font-size="11" font-style="italic" fill="#6B7280" text-anchor="middle">Two boundaries cross the memory: the durability line (scratch vs. the record) and the Agent-folder boundary (agentm's space vs. the user's own vault).</text>
</svg>
