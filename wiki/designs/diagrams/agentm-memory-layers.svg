<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect x="6" y="6" width="808" height="458" rx="16" fill="#ffffff" stroke="#E3E3E8" stroke-width="1.5"/>

  <!-- Layer 0 -->
  <rect x="110" y="24" width="600" height="50" rx="9" fill="#F3F4F6" stroke="#9AA0A6" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="410" y="45" font-size="13" font-weight="700" fill="#3C4043" text-anchor="middle">Layer 0 · harness memory</text>
  <text x="410" y="63" font-size="10.5" font-style="italic" fill="#6B7280" text-anchor="middle">the running context window — ephemeral scratch, never the record</text>

  <!-- durability line -->
  <line x1="40" y1="92" x2="780" y2="92" stroke="#B6BAC2" stroke-width="1.3" stroke-dasharray="3 4"/>
  <rect x="300" y="84" width="220" height="16" rx="3" fill="#ffffff"/>
  <text x="410" y="96" font-size="10" font-style="italic" fill="#9AA0A6" text-anchor="middle">durability line — scratch above, the record below</text>

  <!-- T1 personal (outer) -->
  <rect x="60" y="108" width="700" height="290" rx="12" fill="#FBF3E2" stroke="#C8961E" stroke-width="1.5"/>
  <text x="80" y="130" font-size="12.5" font-weight="700" fill="#6B4E12">T1 · personal — the operator's Obsidian vault (outside Agent/)</text>
  <text x="80" y="147" font-size="10" font-style="italic" fill="#9A7A2E">agentm reads + links · writes only when told, through a separate seam call</text>

  <!-- T2 curated (middle) -->
  <rect x="92" y="160" width="636" height="220" rx="11" fill="#E9F4EF" stroke="#2E8B6F" stroke-width="1.5"/>
  <text x="112" y="182" font-size="12.5" font-weight="700" fill="#1E5C45">T2 · curated / collaborative — Agent/  (our shared drive)</text>
  <text x="112" y="199" font-size="9.5" font-style="italic" fill="#3E7A63">designs · plans · roadmaps · operator-directives — agent writes + reports each change in the digest · revertable</text>

  <!-- T3 agentm-sole (inner) -->
  <rect x="124" y="212" width="572" height="148" rx="10" fill="#EAF1FB" stroke="#2F6FBA" stroke-width="1.5"/>
  <text x="144" y="234" font-size="12.5" font-weight="700" fill="#1B3A5B">T3 · agentm-sole — Agent/Memory/</text>
  <text x="144" y="251" font-size="9.5" font-style="italic" fill="#5E7A99">the agent's own learned memory + insights — writes, curates, prunes freely (no notice)</text>
  <text x="144" y="277" font-size="9.5" fill="#3C5E80">leaves: &lt;kind&gt;/&lt;slug&gt;.md · reserved: _always-load · _inbox · _idea-incubator · _index · _meta · _archive</text>
  <text x="144" y="296" font-size="9.5" fill="#3C5E80">consolidation kinds (designed-for): crystallized/ · procedural/</text>
  <text x="144" y="332" font-size="9" font-style="italic" fill="#5E7A99">the deeper in, the freer the agent's hand</text>

  <!-- caption -->
  <text x="410" y="420" font-size="11" font-style="italic" fill="#6B7280" text-anchor="middle">Two planes: the durability line (scratch vs. the record) and the nested ownership tiers (containment = autonomy).</text>
  <text x="410" y="440" font-size="10.5" font-style="italic" fill="#6B7280" text-anchor="middle">Every tier carries an _archive/ that recall skips by default · kind is the orthogonal third axis, in each entry's frontmatter.</text>
</svg>
