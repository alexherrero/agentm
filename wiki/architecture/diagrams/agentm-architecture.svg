<svg viewBox="0 0 820 600" width="1148" height="840" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="s" markerWidth="10" markerHeight="10" refX="7.2" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5B7C9E"/>
    </marker>
  </defs>

  <!-- vertical seam arrows -->
  <g stroke="#5B7C9E" stroke-width="2" fill="none" marker-end="url(#s)">
    <path d="M410,76 L410,124"/>
    <path d="M410,202 L410,264"/>
    <path d="M410,418 L410,466"/>
  </g>
  <text x="420" y="106" font-size="10" font-style="italic" fill="#8a8a92">install onto your host</text>
  <text x="420" y="240" font-size="10" font-style="italic" fill="#8a8a92">compose one-way (capability seam)</text>
  <text x="420" y="448" font-size="10" font-style="italic" fill="#8a8a92">persist via the storage seam</text>

  <!-- Band 1: hosts -->
  <text x="40" y="56" font-size="11" font-weight="700" fill="#9aa0a8">HOSTS</text>
  <rect x="230" y="30" width="170" height="44" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.6"/>
  <text x="315" y="57" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3a4250">Claude Code</text>
  <rect x="420" y="30" width="170" height="44" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.6"/>
  <text x="505" y="57" text-anchor="middle" font-size="12.5" font-weight="600" fill="#3a4250">Antigravity</text>

  <!-- Band 2: crickets -->
  <rect x="110" y="124" width="600" height="76" rx="10" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.8"/>
  <text x="410" y="150" text-anchor="middle" font-size="14" font-weight="700" fill="#34516e">crickets — the capability toolkit</text>
  <text x="410" y="170" text-anchor="middle" font-size="10" font-style="italic" fill="#5B7C9E">code review · the dev loop · wiki · board sync · token audit · and more</text>
  <text x="410" y="188" text-anchor="middle" font-size="9.5" font-style="italic" fill="#8a8a92">composable plugins, installed per host</text>

  <!-- Band 3: AgentM substrate -->
  <rect x="70" y="264" width="680" height="152" rx="12" fill="#FBFCFE" stroke="#3A6EA5" stroke-width="2.4"/>
  <text x="92" y="292" font-size="14" font-weight="700" fill="#1e3a5f">AgentM</text>
  <text x="92" y="310" font-size="10" font-style="italic" fill="#3A6EA5">the substrate — four pillars on a durable memory engine</text>

  <rect x="92" y="326" width="148" height="74" rx="9" fill="#EAF0F6" stroke="#5B7C9E" stroke-width="1.7"/>
  <text x="166" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#34516e">Memory</text>
  <text x="166" y="377" text-anchor="middle" font-size="9.5" font-style="italic" fill="#5B7C9E">remembers</text>

  <rect x="256" y="326" width="148" height="74" rx="9" fill="#E9F6EE" stroke="#3A9D5D" stroke-width="1.7"/>
  <text x="330" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#27613f">Experience</text>
  <text x="330" y="377" text-anchor="middle" font-size="9.5" font-style="italic" fill="#3A9D5D">learns + improves</text>

  <rect x="420" y="326" width="148" height="74" rx="9" fill="#FBF3E2" stroke="#C8961E" stroke-width="1.7"/>
  <text x="494" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#8a6516">Opinions</text>
  <text x="494" y="377" text-anchor="middle" font-size="9.5" font-style="italic" fill="#b5851a">holds standards</text>

  <rect x="584" y="326" width="148" height="74" rx="9" fill="#F2EEFB" stroke="#7E57C2" stroke-width="1.7"/>
  <text x="658" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#5b3a8c">Personas</text>
  <text x="658" y="377" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7E57C2">takes on roles</text>

  <!-- Band 4: storage -->
  <text x="40" y="500" font-size="11" font-weight="700" fill="#9aa0a8">STORAGE</text>
  <rect x="210" y="470" width="180" height="48" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.6"/>
  <text x="300" y="499" text-anchor="middle" font-size="12" font-weight="600" fill="#3a4250">device-local</text>
  <rect x="420" y="470" width="200" height="48" rx="9" fill="#F0F2F5" stroke="#8a93a0" stroke-width="1.6"/>
  <text x="520" y="499" text-anchor="middle" font-size="12" font-weight="600" fill="#3a4250">Google Drive vault</text>

  <text x="410" y="556" text-anchor="middle" font-size="10" font-style="italic" fill="#8a8a92">A reader's birds-eye: an agent runs on a host, crickets gives it capabilities, AgentM gives it memory and judgment, and the vault keeps it all.</text>
</svg>
