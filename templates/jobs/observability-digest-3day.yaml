# observability-digest-3day.yaml — the every-3-days rung of the
# observability ledger's digest ladder (PLAN-observability-console task 2).
# See observability-digest-daily.yaml's own header note for the shared
# registration/tier/dry-run rationale.
schedule: 3d
lookback: 24h
command: >-
  python3 -m health.inbox_digest --cadence 3day
  --db-path ~/.cache/agentm/telemetry/rollup.db
  --vault-path "$MEMORY_VAULT_PATH"
tier: T2
dry_run: true
